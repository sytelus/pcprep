# pcprep tmux baseline.  Copied verbatim from ubuntu/.tmux.conf because every
# option here is portable between Linux and macOS.
#
# Installed by mac/apply_dotfiles.sh into ~/.tmux.conf only when the user
# does NOT already have a ~/.tmux.conf — we never clobber existing edits.

# Force 256-color output so colored prompts, Vim themes, and ripgrep
# highlighting render correctly inside tmux panes.
set -g default-terminal "screen-256color"

# Keep 30,000 lines of scrollback per pane (default is 2,000).  Helpful for
# long build logs, training runs, or anything you want to scroll back to
# hours later without setting up a separate logger.
set -g history-limit 30000

# Let tmux update the terminal-emulator title to the active session/window.
set -g set-titles on

# Enable mouse support: click to focus pane, drag to resize, wheel to scroll.
# macOS Terminal.app and iTerm2 both honor this once `set -g mouse on`.
set -g mouse on

# Lower the ESC-sequence timeout from tmux's 500 ms default to 50 ms so Vim,
# Neovim, and other modal editors respond to <Esc> without a visible delay.
set -s escape-time 50

# Shift + arrow keys / PageUp / PageDown: enter copy-mode and scroll the
# buffer without needing the leader key.  Mirrors how most terminal
# emulators already behave when mouse scrolling is unavailable.
bind -n S-Up       copy-mode -e \; send-keys -X scroll-up
bind -n S-Down     copy-mode -e \; send-keys -X scroll-down
bind -n S-Pageup   copy-mode -e \; send-keys -X halfpage-up
bind -n S-Pagedown copy-mode -e \; send-keys -X halfpage-down
